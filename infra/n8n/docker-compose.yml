version: '3.9'
services:
  n8n:
    image: n8nio/n8n:latest
    ports: ["5678:5678"]
    environment:
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
      - OMNIS_API_URL=http://localhost:8001
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  n8n_data:
