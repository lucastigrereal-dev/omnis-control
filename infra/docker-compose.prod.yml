version: "3.9"

networks:
  omnis-net:
    driver: bridge

volumes:
  qdrant_data:
  n8n_data:

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - omnis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  litellm:
    build:
      context: ./infra/litellm
    ports:
      - "4000:4000"
    networks:
      - omnis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - omnis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  omnis-api:
    image: python:3.12-slim
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8765
    ports:
      - "8765:8765"
    networks:
      - omnis-net
    depends_on:
      qdrant:
        condition: service_healthy
      litellm:
        condition: service_healthy
      n8n:
        condition: service_healthy
    environment:
      OMNIS_API_KEY: "${OMNIS_API_KEY:-}"
      QDRANT_HOST: qdrant
      N8N_HOST: n8n
      LITELLM_HOST: litellm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
