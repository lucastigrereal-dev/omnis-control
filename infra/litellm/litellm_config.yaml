# LiteLLM Config — Quality-First v2.1
# Política oficial: notion.so/36d22eba8f088199a2d6cf5a7e958cee
# Benchmarks: notion.so/36d22eba8f08815b9b29c5de05d032fb
# NUNCA usar claude-opus*, gpt-4*, gpt-4o*, gpt-5*
# Ollama Pro Cloud URL: https://ollama.com

model_list:
  # ── Ollama Cloud Premium (primários) ─────────────────────────────────────
  - model_name: ollama-fast
    litellm_params:
      model: ollama/glm-5.1:cloud
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: ollama-code
    litellm_params:
      model: ollama/kimi-k2.6:cloud
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: ollama-build
    litellm_params:
      model: ollama/minimax-m2.7:cloud
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: ollama-smart
    litellm_params:
      model: ollama/deepseek-v4-pro:cloud
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: ollama-longctx
    litellm_params:
      model: ollama/minimax-m2.7:cloud
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: ollama-backup
    litellm_params:
      model: ollama/qwen3.5:397b:cloud
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  # ── Anthropic fallback (COMENTADO — desativado por enquanto) ──────────────
  # - model_name: fallback-cheap
  #   litellm_params:
  #     model: claude-haiku-4-5
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # - model_name: fallback-premium
  #   litellm_params:
  #     model: claude-sonnet-4-6
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # ── Aliases retrocompatíveis (Anthropic — COMENTADO) ─────────────────────
  # - model_name: haiku
  #   litellm_params:
  #     model: claude-haiku-4-5
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # - model_name: sonnet
  #   litellm_params:
  #     model: claude-sonnet-4-6
  #     api_key: os.environ/ANTHROPIC_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - {"ollama-fast":    ["ollama-backup"]}
    - {"ollama-code":    ["ollama-backup"]}
    - {"ollama-build":   ["ollama-code"]}
    - {"ollama-smart":   ["ollama-code"]}
    - {"ollama-longctx": ["ollama-smart"]}

general_settings:
  max_budget: 25
  budget_duration: 1mo
