version: '3.9'
services:
  litellm:
    image: litellm/litellm:latest  # ghcr berriai:main = v1.10.1 (bug Azure init), Docker Hub = OK
    ports: ["4001:4000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
