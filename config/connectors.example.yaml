# Conectores OMNIS — EXEMPLO SEGURO
# Este arquivo pode ser commitado. NÃO contém valores reais.
# Copie para connectors.yaml e preencha com valores reais (nunca commite connectors.yaml com secrets).

connectors:

  - id: publisher_os_mcp
    name: Publisher OS MCP
    description: "MCP server com 12 tools para produção de conteúdo"
    type: mcp
    host: localhost
    port: 8000
    status: available
    auth: none
    notes: "Server em ~/publisher-os/mcp_server.py"

  - id: publisher_os_api
    name: Publisher OS API
    description: "API HTTP do Publisher OS Core"
    type: http
    host: localhost
    port: 3200
    status: available
    auth: none

  - id: akasha_postgres
    name: Akasha PostgreSQL (pgvector)
    description: "Base vetorial com 20K docs, 606K chunks"
    type: postgres
    host: localhost
    port: 5432
    database: akasha
    status: available
    auth: env (PGPASSWORD)

  - id: instagram_graph_api
    name: Instagram Graph API (Meta)
    description: "API para publicacao nos 6 perfis Instagram"
    type: oauth2
    host: graph.facebook.com
    status: pending
    auth: oauth2
    notes: "Configurar META_APP_ID e META_APP_SECRET via env vars"

  - id: qdrant
    name: Qdrant
    description: "Vector DB para busca semântica"
    type: http
    host: localhost
    port: 6333
    status: unavailable
    auth: none

  - id: ollama
    name: Ollama
    description: "LLM local"
    type: http
    host: localhost
    port: 11434
    status: available
    auth: none

  - id: litellm
    name: LiteLLM Proxy
    description: "Gateway para 7 modelos via OpenRouter"
    type: http
    host: localhost
    port: 4002
    status: available
    auth: api_key
    notes: "Master key definida via env var LITELLM_MASTER_KEY"
    next_step: "Criar key dedicada OMNIS"

  - id: supabase_local
    name: Supabase DB (publisher-os)
    description: "Banco local do Publisher OS"
    type: postgres
    host: localhost
    port: 5434
    database: postgres
    status: available
    auth: env

  - id: redis
    name: Redis (publisher-os)
    description: "Cache e fila do Publisher OS"
    type: redis
    host: localhost
    port: 6382
    status: available
    auth: none

  - id: n8n
    name: n8n
    description: "Workflow automation"
    type: http
    host: localhost
    port: 5678
    status: unknown
    auth: none

  - id: whatsapp_bridge
    name: WhatsApp Bridge
    description: "Notificacoes e comunicacao com hoteis"
    type: api
    host: pending
    status: planned
    auth: pending

  - id: telegram_bot
    name: Telegram Bot
    description: "Notificacoes operacionais"
    type: bot
    host: pending
    status: planned
    auth: bot_token

  - id: mercado_pago
    name: Mercado Pago / Stripe
    description: "Gateway de pagamento para vendas"
    type: api
    host: pending
    status: planned
    auth: api_key

  - id: supabase_hotels
    name: Supabase Hotels (Daily Prophet)
    description: "Banco do Daily Prophet Hotels"
    type: postgres
    host: aws (sa-east-1)
    port: 5432
    database: postgres
    status: available
    auth: connection_string

  - id: github_connector
    name: GitHub API
    description: "Sincronizacao com repositorios"
    type: api
    host: api.github.com
    status: available
    auth: token
    notes: "Token definido via env var GITHUB_TOKEN"
