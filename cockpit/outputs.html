<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outputs & Exports — OMNIS Cockpit</title>
<link rel="stylesheet" href="styles.css">
<style>
.filters { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
.filter-btn {
  padding: .35rem .85rem; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface-2); color: var(--text-dim); font-size: .82rem;
  cursor: pointer; font-weight: 600; transition: background .15s, color .15s;
}
.filter-btn.active, .filter-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: .7rem;
  padding: 1rem; display: flex; flex-direction: column; gap: .5rem;
}
.card:hover { border-color: var(--accent); }
.card-header { display: flex; align-items: flex-start; gap: .5rem; }
.card-title { font-size: .92rem; font-weight: 700; flex: 1; line-height: 1.3; }
.badge {
  display: inline-block; padding: .2rem .55rem; border-radius: 999px;
  font-size: .72rem; font-weight: 700; white-space: nowrap;
}
.badge-content  { background: rgba(34,211,238,.15); color: var(--accent); }
.badge-design   { background: rgba(167,139,250,.15); color: var(--accent-2); }
.badge-video    { background: rgba(251,191,36,.15);  color: var(--warning); }
.badge-app      { background: rgba(52,211,153,.15);  color: var(--success); }
.badge-skill    { background: rgba(248,113,113,.15); color: var(--danger); }
.badge-report   { background: rgba(156,163,175,.15); color: var(--text-dim); }
.badge-pronto   { background: rgba(52,211,153,.15);  color: var(--success); }
.badge-revisar  { background: rgba(251,191,36,.15);  color: var(--warning); }
.badge-falta    { background: rgba(248,113,113,.15); color: var(--danger); }
.card-meta { font-size: .78rem; color: var(--text-dim); }
.card-files { font-size: .78rem; color: var(--text-dim); }
.card-actions { margin-top: auto; display: flex; gap: .5rem; flex-wrap: wrap; }
.btn-sm {
  padding: .3rem .7rem; border-radius: .35rem; font-size: .78rem; font-weight: 600;
  text-decoration: none; border: 1px solid var(--border); background: var(--surface-2);
  color: var(--text); cursor: pointer;
}
.btn-sm:hover { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-download { background: rgba(52,211,153,.15); border-color: var(--success); color: var(--success); }
.btn-download:hover { background: var(--success); color: #000; }
.next-action { font-size: .75rem; color: var(--text-dim); font-style: italic; }
#no-results { display: none; color: var(--text-dim); padding: 2rem; text-align: center; }
</style>
</head>
<body>
<nav class="topnav">
  <a href="index.html">Missões</a>
  <a href="approvals.html">Aprovações</a>
  <a href="outputs.html" style="color:var(--accent)">Outputs</a>
  <span class="brand">OMNIS Cockpit</span>
</nav>
<main class="container">

<h1>Outputs &amp; Exports</h1>

<div class="stats" id="stats-row"></div>

<div class="filters" id="type-filters">
  <button class="filter-btn active" data-filter-type="all">All</button>
  <button class="filter-btn" data-filter-type="content">Content</button>
  <button class="filter-btn" data-filter-type="design">Design</button>
  <button class="filter-btn" data-filter-type="video">Video</button>
  <button class="filter-btn" data-filter-type="app">App</button>
  <button class="filter-btn" data-filter-type="skill">Skill</button>
  <button class="filter-btn" data-filter-type="report">Report</button>
</div>

<div class="filters" id="status-filters">
  <button class="filter-btn active" data-filter-status="all">All</button>
  <button class="filter-btn" data-filter-status="pronto">Pronto</button>
  <button class="filter-btn" data-filter-status="revisar">Revisar</button>
  <button class="filter-btn" data-filter-status="falta">Falta</button>
</div>

<div class="cards" id="cards"></div>
<div id="no-results">Nenhuma missão encontrada para os filtros selecionados.</div>

</main>
<footer class="footer">
  <span>OMNIS Control</span>
  <span id="gen-time">—</span>
</footer>

<script src="outputs_data.js"></script>
<script>
(function () {
  const data = typeof OUTPUTS_DATA !== 'undefined' ? OUTPUTS_DATA : { missions: [], generated_at: '' };
  const missions = data.missions || [];

  // Stats
  const statsRow = document.getElementById('stats-row');
  const total = missions.length;
  const pronto = missions.filter(m => m.status === 'pronto').length;
  const revisar = missions.filter(m => m.status === 'revisar').length;
  const falta = missions.filter(m => m.status === 'falta').length;
  statsRow.innerHTML = [
    ['Total', total, ''],
    ['Pronto', pronto, 'color:var(--success)'],
    ['Revisar', revisar, 'color:var(--warning)'],
    ['Falta', falta, 'color:var(--danger)'],
  ].map(([label, val, style]) =>
    `<div class="stat"><span class="stat-num" style="${style}">${val}</span><span class="stat-label">${label}</span></div>`
  ).join('');

  // Gen time
  if (data.generated_at) {
    document.getElementById('gen-time').textContent = 'Gerado: ' + data.generated_at.slice(0, 19).replace('T', ' ');
  }

  let activeType = 'all';
  let activeStatus = 'all';

  function render() {
    const filtered = missions.filter(m =>
      (activeType === 'all' || m.type === activeType) &&
      (activeStatus === 'all' || m.status === activeStatus)
    );
    const cards = document.getElementById('cards');
    const noRes = document.getElementById('no-results');
    if (filtered.length === 0) { cards.innerHTML = ''; noRes.style.display = 'block'; return; }
    noRes.style.display = 'none';
    cards.innerHTML = filtered.map(m => {
      const typeLabel = m.type.charAt(0).toUpperCase() + m.type.slice(1);
      const statusLabel = m.status.charAt(0).toUpperCase() + m.status.slice(1);
      const fileCount = (m.files || []).length;
      const zipBtn = m.zip_path
        ? `<a class="btn-sm btn-download" href="${m.zip_path}" download>⬇ Download ZIP</a>`
        : '';
      const folderBtn = m.mission_path
        ? `<span class="btn-sm" title="${m.mission_path}">📁 ${m.id}</span>`
        : '';
      return `
<div class="card" data-type="${m.type}" data-status="${m.status}">
  <div class="card-header">
    <span class="card-title">${escHtml(m.name)}</span>
  </div>
  <div style="display:flex;gap:.4rem;flex-wrap:wrap">
    <span class="badge badge-${m.type}">${typeLabel}</span>
    <span class="badge badge-${m.status}">${statusLabel}</span>
  </div>
  <div class="card-files">${fileCount} arquivo${fileCount !== 1 ? 's' : ''}</div>
  <div class="card-actions">
    ${folderBtn}
    ${zipBtn}
  </div>
  <div class="next-action">→ ${escHtml(m.next_action)}</div>
</div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Filter buttons
  document.getElementById('type-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter-type]');
    if (!btn) return;
    activeType = btn.dataset.filterType;
    document.querySelectorAll('[data-filter-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  document.getElementById('status-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter-status]');
    if (!btn) return;
    activeStatus = btn.dataset.filterStatus;
    document.querySelectorAll('[data-filter-status]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  render();
})();
</script>
</body>
</html>
