<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Detail — OMNIS Cockpit</title>
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>
<nav class="topnav">
  <a href="index.html"><span class="nav-icon">&#9632;</span> Dashboard</a>
  <a href="missions.html" class="active"><span class="nav-icon">&#9776;</span> Missions</a>
  <a href="backlog.html"><span class="nav-icon">&#9776;</span> Backlog</a>
  <a href="quality.html"><span class="nav-icon">&#9733;</span> Quality</a>
  <a href="templates.html"><span class="nav-icon">&#9636;</span> Templates</a>
  <a href="runs.html"><span class="nav-icon">&#9881;</span> Runs</a>
  <a href="search.html"><span class="nav-icon">&#8981;</span> Search</a>
  <a href="system.html"><span class="nav-icon">&#9880;</span> System</a>
  <span class="brand">OMNIS Cockpit</span>
</nav>

<main class="container">
  <a href="missions.html">&larr; Back to Missions</a>
  <h1 id="m-title" style="margin-top:0.5rem;">Mission</h1>

  <div class="card" id="m-card">
    <div class="grid-2">
      <div><strong>ID:</strong> <span id="m-id">—</span></div>
      <div><strong>Status:</strong> <span id="m-status">—</span></div>
      <div><strong>Sector:</strong> <span id="m-setor">—</span></div>
      <div><strong>Created by:</strong> <span id="m-criado">—</span></div>
      <div><strong>Opened:</strong> <span id="m-aberto">—</span></div>
      <div><strong>Closed:</strong> <span id="m-fechado">—</span></div>
    </div>
    <div style="margin-top:1rem;">
      <strong>Objective:</strong>
      <p id="m-objetivo" style="margin-top:0.3rem; white-space:pre-wrap;">—</p>
    </div>
  </div>

  <div class="grid-2">
    <!-- File Tree -->
    <div class="card">
      <h2>Outputs & Files</h2>
      <ul class="activity-list" id="m-files"><li>Loading...</li></ul>
    </div>

    <!-- Report Preview -->
    <div class="card">
      <h2>Report Preview</h2>
      <div id="m-report" style="font-size:0.88rem; white-space:pre-wrap;">Loading...</div>
    </div>
  </div>
</main>

<footer class="footer">
  <span>OMNIS Control v1.0.0</span>
  <span id="gen-time">—</span>
</footer>

<script>
(function(){
  var id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    document.getElementById('m-title').textContent = 'No mission specified';
    return;
  }

  fetch('data/missions.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var m = (data.missions||[]).find(function(x){ return x.mission_id === id; });
      if (!m) {
        document.getElementById('m-title').textContent = 'Mission not found: ' + id;
        return;
      }
      document.title = id + ' — OMNIS Cockpit';
      document.getElementById('m-title').textContent = id;
      document.getElementById('m-id').textContent = m.mission_id;
      document.getElementById('m-status').innerHTML = '<span class="badge badge-' + m.status + '">' + m.status + '</span>';
      document.getElementById('m-setor').textContent = m.setor || '—';
      document.getElementById('m-criado').textContent = m.criado_por || '—';
      document.getElementById('m-aberto').textContent = (m.timestamp||'—');
      document.getElementById('m-fechado').textContent = m.closed_at || '—';
      document.getElementById('m-objetivo').textContent = m.objetivo || 'No objective defined.';
      document.getElementById('gen-time').textContent = 'Data: ' + (data.generated_at||'—');

      // File counts
      var filesHtml = '';
      var path = m.path || (id + '');
      var entries = [
        ['mission_contract.json', path + '/mission_contract.json'],
        ['01_mission_brief.md', path + '/01_mission_brief.md'],
        ['03_execution_plan.md', path + '/03_execution_plan.md'],
        ['relatorio_final.md', path + '/relatorio_final.md'],
      ];
      entries.forEach(function(e){
        filesHtml += '<li><a href="../' + e[1] + '" target="_blank">' + e[0] + '</a></li>';
      });
      if (m.outputs_count > 0) filesHtml += '<li><strong>05_outputs/</strong> — ' + m.outputs_count + ' files</li>';
      if (m.exports_count > 0) filesHtml += '<li><strong>06_exports/</strong> — ' + m.exports_count + ' files</li>';
      if (m.logs_count > 0) filesHtml += '<li><strong>08_logs/</strong> — ' + m.logs_count + ' files</li>';
      if (m.has_approval_pending) filesHtml += '<li><span class="badge badge-pending">PENDING APPROVAL</span></li>';
      document.getElementById('m-files').innerHTML = filesHtml;

      // Report
      if (m.has_report) {
        document.getElementById('m-report').innerHTML =
          '<p><a href="../' + path + '/relatorio_final.md" target="_blank">View full report</a></p>';
      } else {
        document.getElementById('m-report').innerHTML = '<p style="color:var(--text-muted)">No report generated yet.</p>';
      }
    })
    .catch(function(){
      document.getElementById('m-title').textContent = 'Error loading data';
    });
})();
</script>
</body>
</html>
