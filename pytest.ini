[pytest]
addopts = --import-mode=importlib -p no:warnings --timeout=30
testpaths = tests
norecursedirs = _archive .venv .git __pycache__ .pytest_cache .test_tmp .claude/worktrees
markers =
    real_llm: chama LLM real (Ollama local) — requer Ollama rodando
    integration: requer container externo (Qdrant, LiteLLM, n8n) — roda separado
