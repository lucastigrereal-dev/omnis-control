status_legend:
  DONE: "Concluded and committed"
  REVIEW: "Concluded but needs review before merge"
  ACTIVE: "Currently in progress"
  PAUSED: "Paused to avoid conflict"
  PENDING: "Not started"
  BLOCKED: "Blocked by risk/error/secret"
  FUTURE: "Future vision"
  MERGED: "Merged into principal"
  CANONICAL: "Canonical implementation — supersedes alternatives"
  REDUNDANT: "No unique work — archive recommended"
  SUPERSEDED: "Replaced by canonical implementation"

